data:
  train_csv: "/media/govtech/Disk 1/EEG_representation_learning/TUH-EEG-8S/PT/metadata.csv"
  val_csv: "/media/govtech/Disk 1/EEG_representation_learning/TUH-EEG-8S/PT_val/metadata.csv"
  num_channels: 16
  T: 2000
  batch_size: 2048
  num_workers: 16

training:
  epochs: 10
  output_dir: "0_10-epochs_6-mask"

optimizer:
  lr: 1e-4
  betas: [0.9, 0.95]
  weight_decay: 0.05

scheduler:
  name: cosine
  eta_min: 1e-6

model:
  mask_ratio: 0.6
  embed_dim: 128
  transformer_depth: 2
  nhead: 2
  ff_dim: 512
  conv_decoder_hidden: 64
  dropout: 0.0
